apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-simulator
  namespace: default
  labels:
    app: sensor-simulator
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-simulator
  template:
    metadata:
      labels:
        app: sensor-simulator
    spec:
      containers:
      - name: sensor-simulator
        image: iotbuildingregistry.azurecr.io/sensor-simulator:latest
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        env:
        - name: ENVIRONMENT
          value: "dev"
        - name: BUILDING_COUNT
          value: "3"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import sys; sys.exit(0)"
          initialDelaySeconds: 10
          periodSeconds: 30
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: sensor-simulator-service
  namespace: default
spec:
  selector:
    app: sensor-simulator
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP